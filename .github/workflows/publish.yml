name: Publish MCP servers

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/publish.yml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/publish.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: oleander/mcp
  CATALOG: oleander/mcp-catalog

jobs:
  # ── 1. Build and push each server image in parallel ───────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        server: [plex]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.server }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.server }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.server }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.server }}
          cache-to: type=gha,mode=max,scope=${{ matrix.server }}

  # ── 2. Verify each image speaks MCP before credentials are required ────────
  verify:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        server: [plex]

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe tools/list via JSON-RPC stdin
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.server }}
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-probe","version":"0.0.1"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 15 docker run -i --rm "$IMAGE" 2>/dev/null \
            | grep '"tools"' \
            | jq -r --argjson min 0 \
                'if .result.tools | length > $min then .result.tools | length else error end'

  # ── 3. Assemble the catalog OCI artifact ──────────────────────────────────
  catalog:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Add servers to catalog
        env:
          CATALOG_REF: ${{ env.REGISTRY }}/${{ env.CATALOG }}:latest
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ env.IMAGE }}
        run: |
          docker mcp catalog server add "$CATALOG_REF" \
            --server docker://$IMAGE_BASE:plex

  # ── 4. Inspect each catalog entry in parallel ─────────────────────────────
  inspect:
    runs-on: ubuntu-latest
    needs: catalog
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        server: [plex]

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect catalog entry
        env:
          CATALOG_REF: ${{ env.REGISTRY }}/${{ env.CATALOG }}:latest
          SERVER: ${{ matrix.server }}
        run: docker mcp catalog server inspect "$CATALOG_REF" "$SERVER"

      - name: Check tool count
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.server }}
        run: |
          docker mcp tools ls --server "docker://$IMAGE" --format json \
            | jq -r 'length' | grep -v '^0$' || exit 1
